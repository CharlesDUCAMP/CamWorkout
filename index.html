<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MonSport</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap');
:root {
  --bg:#0d0f14; --surface:#161922; --card:#1e2330; --border:#2a3040;
  --a1:#f0a500; --a2:#e05c2a; --a3:#3ab5e6; --green:#2ecc71; --red:#e74c3c;
  --text:#eef0f5; --muted:#6b7590; --nav-h:80px;
  --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text);}
#app{display:flex;flex-direction:column;height:100%;}
#topbar{position:fixed;top:0;left:0;right:0;z-index:200;padding-top:var(--safe-top);background:rgba(13,15,20,0.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:calc(var(--safe-top) + 56px);display:flex;align-items:flex-end;padding:0 18px 10px;justify-content:space-between;}
#topbar h1{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:3px;background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:10px;}
#btn-logout{background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.3);color:var(--red);padding:4px 10px;border-radius:8px;font-size:0.75rem;font-weight:600;cursor:pointer;}
#screen-area{flex:1;overflow-y:auto;padding-top:calc(var(--safe-top) + 70px);padding-bottom:calc(var(--nav-h) + var(--safe-bot) + 20px);}
#nav{position:fixed;bottom:0;left:0;right:0;z-index:200;height:calc(var(--nav-h) + var(--safe-bot));background:rgba(22,25,34,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:0.62rem;font-weight:600;cursor:pointer;}
.nav-btn.active{color:var(--text);}
.nav-btn[data-tab=jambes].active{color:var(--a1);}
.nav-btn[data-tab=pecs].active{color:var(--a2);}
.nav-btn[data-tab=dos].active{color:var(--a3);}
.nav-btn[data-tab=add].active{color:var(--green);}
.screen{display:none;padding:14px;}.screen.active{display:block;}
.screen-title{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:2px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.dot{width:10px;height:10px;border-radius:50%;}
.exo-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:14px;}
.acc-item{border-radius:9px;overflow:hidden;border:1px solid var(--border);margin-bottom:4px;}
.acc-toggle{width:100%;background:var(--surface);border:none;color:var(--text);padding:11px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:'Outfit';font-weight:600;}
.acc-body{max-height:0;overflow:hidden;transition:max-height 0.3s ease;background:var(--card);}
.acc-body.open{max-height:800px;}
.acc-row{display:flex;align-items:center;gap:10px;padding:7px 12px;font-size:0.82rem;border-bottom:1px solid rgba(255,255,255,0.04);}
.acc-kg{margin-left:auto;font-weight:700;color:var(--a3);background:rgba(58,181,230,0.1);border-radius:5px;padding:2px 8px;}
.del-seance-btn{display:block;margin:10px auto;padding:8px;width:90%;background:rgba(231,76,60,0.1);border:1px solid var(--red);color:var(--red);border-radius:8px;font-weight:600;cursor:pointer;}
.pb-badge{display:inline-block;background:rgba(240,165,0,0.15);border:1px solid rgba(240,165,0,0.4);color:var(--a1);border-radius:6px;font-size:0.72rem;font-weight:700;padding:2px 8px;margin-left:8px;vertical-align:middle;}
.chart-wrap{position:relative;height:160px;margin-top:12px;}
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.form-group{width:100%;max-width:320px;margin-bottom:14px;}
input,select{background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:12px;width:100%;font-family:'Outfit';}
.btn-save{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;font-family:'Bebas Neue';font-size:1.25rem;cursor:pointer;margin-top:10px;}
.sets-list .set-row{display:grid;grid-template-columns:30px 1fr 1fr 40px;gap:8px;margin-bottom:8px;align-items:center;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:30px;display:none;z-index:1000;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.show{display:flex;}
.modal-sheet{background:var(--card);padding:20px;border-radius:15px;width:85%;}
</style>
</head>
<body>

<div id="login-screen">
  <h1 style="font-family:'Bebas Neue';font-size:3.5rem;background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:30px;">MonSport</h1>
  <div class="form-group"><input type="email" id="login-email" placeholder="Email"></div>
  <div class="form-group"><input type="password" id="login-pass" placeholder="Mot de passe"></div>
  <button class="btn-save" onclick="loginWithFirebase()">SE CONNECTER</button>
  <button onclick="registerWithFirebase()" style="background:none;border:none;color:var(--muted);margin-top:20px;text-decoration:underline;">Créer un compte</button>
  <button onclick="resetPassword()" style="background:none;border:none;color:var(--muted);margin-top:10px;text-decoration:underline;font-size:0.85rem;">Mot de passe oublié ?</button>
</div>

<div id="app" style="display:none;">
  <div id="topbar">
    <h1>💪 MonSport <button id="btn-logout" onclick="logoutFirebase()">Quitter</button></h1>
    <div style="text-align:right">
      <div id="topbar-sub" style="font-size:0.72rem;color:var(--muted);">Bas du Corps</div>
      <div id="sync-badge" style="font-size:0.68rem;color:var(--muted);">💾 local</div>
    </div>
  </div>

  <div id="screen-area">
    <div class="screen active" id="screen-jambes"></div>
    <div class="screen" id="screen-pecs"></div>
    <div class="screen" id="screen-dos"></div>
    <div class="screen" id="screen-add">
      <div class="screen-title" style="color:var(--green)">➕ Nouvelle séance</div>
      <select id="add-type" onchange="onTypeChange()" style="margin-bottom:10px;">
        <option value="jambes">🦵 Bas du Corps</option>
        <option value="pecs">🏋️ Pecs / Triceps</option>
        <option value="dos">💪 Dos / Biceps</option>
      </select>
      <select id="add-exo" onchange="updateRef()"></select>
      <div id="ref-last-sets" style="margin:15px 0;font-size:0.8rem;color:var(--muted);background:var(--surface);padding:10px;border-radius:10px;"></div>
      <div id="sets-list" class="sets-list"></div>
      <button onclick="addSetRow()" style="width:100%;padding:10px;background:none;border:1px dashed var(--border);color:var(--muted);border-radius:10px;margin-top:10px;">+ Ajouter série</button>
      <button class="btn-save" onclick="saveSession()">💾 ENREGISTRER</button>
    </div>
  </div>

  <nav id="nav">
    <button class="nav-btn active" data-tab="jambes" onclick="goTab('jambes')"><span>🦵</span><span>Jambes</span></button>
    <button class="nav-btn" data-tab="pecs" onclick="goTab('pecs')"><span>🏋️</span><span>Pecs</span></button>
    <button class="nav-btn" data-tab="dos" onclick="goTab('dos')"><span>💪</span><span>Dos</span></button>
    <button class="nav-btn" data-tab="add" onclick="goTab('add')"><span>➕</span><span>Ajouter</span></button>
  </nav>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-sheet">
    <h3>Supprimer ?</h3>
    <p id="modal-sub" style="margin:15px 0;color:var(--muted);"></p>
    <div style="display:flex;gap:10px;">
      <button onclick="closeModal()" style="flex:1;padding:12px;border-radius:10px;border:none;">Annuler</button>
      <button onclick="confirmDelete()" style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--red);color:#fff;">Supprimer</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCcwQPwp4nzVQg7mjcZeA8as80FlyEELP4",
  authDomain: "myworkoutcam.firebaseapp.com",
  projectId: "myworkoutcam",
  storageBucket: "myworkoutcam.firebasestorage.app",
  messagingSenderId: "1074226820732",
  appId: "1:1074226820732:web:08ed1ca28f0c919b82bbf9"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);
const auth  = getAuth(fbApp);

let userDoc = null;

// ─────────────────────────────────────────────────────────────────────────────
// STRUCTURE DE DONNÉES — IMPORTANT
//
// Firestore interdit les tableaux imbriqués dans des tableaux.
// Chaque séance est stockée comme un OBJET { sets: [...] }
// et NON comme un tableau direct.
//
//   exercises["Squat"] = [
//     { sets: [ {reps:10, kg:80}, {reps:8, kg:75} ] },   ← séance 1
//     { sets: [ {reps:12, kg:85} ] }                      ← séance 2
//   ]
// ─────────────────────────────────────────────────────────────────────────────

const DEFAULT = {
  jambes: { label:"Bas du Corps",   color:"#f0a500", exercises:{ "Squat":[], "Leg Press":[], "Leg Curl assis machine":[], "Mollet":[] }},
  pecs:   { label:"Pecs / Triceps", color:"#e05c2a", exercises:{ "Développé couché haltère":[], "Développé couché barre":[], "Dips incliné PECS":[], "Élévation latérale avant":[], "Élévation latérale côté":[], "Triceps poulie haute":[], "Triceps poulie basse":[] }},
  dos:    { label:"Dos / Biceps",   color:"#3ab5e6", exercises:{ "Traction":[], "Tirage vertical prise large":[], "Rowing à la barre":[], "Australienne":[], "Élévation latérale arrière":[], "Curl":[], "Curl biceps barre EZ":[] }}
};

let S = JSON.parse(JSON.stringify(DEFAULT));
const chartInstances = {};

// ─── UTILITAIRES ─────────────────────────────────────────────────────────────

// Max kg soulevé dans une séance (le set le plus lourd)
function sessionMaxKg(seance) {
  return Math.max(0, ...(seance.sets || []).map(s => s.kg || 0));
}

// Record absolu toutes séances confondues
function getRecord(seances) {
  return Math.max(0, ...seances.map(s => sessionMaxKg(s)));
}

// Progression : différence entre le max de la 1ère séance et le max de la dernière
function getProgression(seances) {
  if (seances.length < 2) return null;
  const first = sessionMaxKg(seances[0]);
  const last  = sessionMaxKg(seances[seances.length - 1]);
  return last - first;
}

// Previous best = set le plus lourd toutes séances confondues
function getPreviousBest(seances) {
  let best = null;
  for (const seance of seances) {
    for (const set of (seance.sets || [])) {
      if (!best || (set.kg || 0) > (best.kg || 0)) best = set;
    }
  }
  return best;
}

// ─── FUSION PROFONDE ──────────────────────────────────────────────────────────
function mergeWithCloud(cloudData) {
  const merged = JSON.parse(JSON.stringify(DEFAULT));
  for (const k of Object.keys(DEFAULT)) {
    if (!cloudData[k]?.exercises) continue;
    for (const exo of Object.keys(DEFAULT[k].exercises)) {
      if (cloudData[k].exercises[exo] !== undefined)
        merged[k].exercises[exo] = cloudData[k].exercises[exo];
    }
    for (const exo of Object.keys(cloudData[k].exercises)) {
      if (!merged[k].exercises[exo])
        merged[k].exercises[exo] = cloudData[k].exercises[exo];
    }
  }
  return merged;
}

// ─── FIREBASE ─────────────────────────────────────────────────────────────────
async function loadData() {
  if (!userDoc) return;
  setBadge('⏳', '#f0a500');
  try {
    const snap = await getDoc(userDoc);
    if (snap.exists()) {
      S = mergeWithCloud(snap.data().workouts);
    } else {
      await setDoc(userDoc, { workouts: S });
    }
    setBadge('☁️', '#2ecc71');
  } catch (e) {
    console.error('[loadData] Erreur Firebase :', e);
    setBadge('📵', '#e74c3c');
    const local = localStorage.getItem('ms_data');
    if (local) { try { S = JSON.parse(local); } catch (_) {} }
  }
  renderAll();
}

async function saveData() {
  if (!userDoc) {
    console.warn('[saveData] userDoc non prêt, retry dans 1s…');
    setTimeout(saveData, 1000);
    return;
  }
  localStorage.setItem('ms_data', JSON.stringify(S));
  setBadge('⏳', '#f0a500');
  try {
    await setDoc(userDoc, { workouts: S });
    setBadge('☁️', '#2ecc71');
  } catch (e) {
    console.error('[saveData] Erreur Firebase :', e);
    setBadge('📵', '#e74c3c');
  }
}

function setBadge(t, c) {
  const b = document.getElementById('sync-badge');
  b.textContent = t; b.style.color = c;
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
window.goTab = (k) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + k).classList.add('active');
  document.querySelector(`.nav-btn[data-tab="${k}"]`).classList.add('active');
  if (k === 'add') window.updateRef();
};

window.onTypeChange = () => {
  const type = document.getElementById('add-type').value;
  const sel  = document.getElementById('add-exo');
  sel.innerHTML = Object.keys(S[type].exercises).map(e => `<option value="${e}">${e}</option>`).join('');
  window.updateRef();
};

window.updateRef = () => {
  const type    = document.getElementById('add-type').value;
  const exo     = document.getElementById('add-exo').value;
  const seances = (S[type].exercises[exo] || []).filter(s => s.sets?.length > 0);
  const last    = seances.length ? seances[seances.length - 1].sets : [];
  const best    = getPreviousBest(seances);

  let html = '';
  if (last.length)
    html += '<div style="margin-bottom:6px;">🕐 <b>Dernière :</b> ' + last.map(s => `${s.reps}@${s.kg}kg`).join(' | ') + '</div>';
  if (best)
    html += '<div>🏆 <b>Previous best :</b> ' + `${best.reps} reps @ ${best.kg} kg` + '</div>';
  if (!html) html = 'Aucun historique pour cet exercice';
  document.getElementById('ref-last-sets').innerHTML = html;
};

window.addSetRow = () => {
  const list = document.getElementById('sets-list');
  const id   = 'sr-' + Date.now() + Math.random();
  const div  = document.createElement('div');
  div.className = 'set-row'; div.id = id;
  div.innerHTML = `
    <div class="set-num">${list.children.length + 1}</div>
    <input type="number" placeholder="Reps" min="1">
    <input type="number" placeholder="Kg" min="0" step="0.5">
    <button onclick="document.getElementById('${id}').remove()" style="background:none;border:none;color:var(--red);font-size:1.2rem;">✕</button>`;
  list.appendChild(div);
};

window.saveSession = () => {
  const type = document.getElementById('add-type').value;
  const exo  = document.getElementById('add-exo').value;
  const sets = [];
  document.querySelectorAll('#sets-list .set-row').forEach(row => {
    const ins = row.querySelectorAll('input');
    if (ins[0].value) sets.push({ reps: parseInt(ins[0].value), kg: parseFloat(ins[1].value) || 0 });
  });
  if (!sets.length) return;
  if (!S[type].exercises[exo]) S[type].exercises[exo] = [];
  // ✅ { sets: [...] } et non un tableau direct — compatible Firestore
  S[type].exercises[exo].push({ sets });
  saveData();
  renderAll();
  window.goTab(type);
};

window.toggleAcc = (id) => document.getElementById(id).classList.toggle('open');

let pending = null;
window.askDelete = (k, e, i) => {
  pending = { k, e, i };
  document.getElementById('modal-sub').textContent = `${e} — Séance ${i + 1}`;
  document.getElementById('modal').classList.add('show');
};
window.confirmDelete = () => {
  S[pending.k].exercises[pending.e].splice(pending.i, 1);
  saveData(); renderAll(); window.closeModal();
};
window.closeModal = () => document.getElementById('modal').classList.remove('show');

// ─── GRAPHIQUES ───────────────────────────────────────────────────────────────
function renderChart(canvasId, seances, color) {
  if (chartInstances[canvasId]) {
    chartInstances[canvasId].destroy();
    delete chartInstances[canvasId];
  }
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  chartInstances[canvasId] = new Chart(canvas, {
    type: 'line',
    data: {
      labels: seances.map((_, i) => `S${i + 1}`),
      datasets: [
        {
          label: 'Max kg',
          data: seances.map(s => sessionMaxKg(s)),
          borderColor: color,
          backgroundColor: color + '22',
          borderWidth: 2,
          pointBackgroundColor: color,
          pointRadius: 4,
          fill: true,
          tension: 0.3,
          yAxisID: 'y'
        },
        {
          label: 'Volume (reps×kg)',
          data: seances.map(s => (s.sets || []).reduce((acc, set) => acc + set.reps * (set.kg || 0), 0)),
          borderColor: '#aaaaaa',
          backgroundColor: 'rgba(170,170,170,0.05)',
          borderWidth: 2,
          borderDash: [5, 4],
          pointBackgroundColor: '#aaaaaa',
          pointRadius: 3,
          fill: false,
          tension: 0.3,
          yAxisID: 'y2'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          labels: { color: '#6b7590', font: { size: 10 }, boxWidth: 12 }
        }
      },
      scales: {
        x:  { ticks: { color: '#6b7590', font: { size: 10 } }, grid: { color: '#2a3040' } },
        y:  { position: 'left',  ticks: { color: color,     font: { size: 10 } }, grid: { color: '#2a3040' } },
        y2: { position: 'right', ticks: { color: '#aaaaaa', font: { size: 10 } }, grid: { drawOnChartArea: false } }
      }
    }
  });
}

// ─── RENDU ────────────────────────────────────────────────────────────────────
function renderAll() {
  ['jambes', 'pecs', 'dos'].forEach(k => {
    const el    = document.getElementById('screen-' + k);
    const color = S[k].color;
    let html = `<div class="screen-title"><div class="dot" style="background:${color}"></div>${S[k].label}</div>`;

    for (const [name, seances] of Object.entries(S[k].exercises)) {
      const valid  = seances.filter(s => s.sets?.length > 0);
      if (!valid.length) continue;
      const record     = getRecord(valid);
      const progression = getProgression(valid);
      const safeId = name.replace(/[^a-zA-Z0-9]/g, '');
      const chartId = `chart-${k}-${safeId}`;

      const progBadge = progression !== null
        ? `<span style="display:inline-block;background:rgba(46,204,113,0.15);border:1px solid rgba(46,204,113,0.4);color:#2ecc71;border-radius:6px;font-size:0.72rem;font-weight:700;padding:2px 8px;margin-left:4px;vertical-align:middle;">${progression >= 0 ? '↑ +' : '↓ '}${progression}kg</span>`
        : '';
      const recordBadge = `<span style="display:inline-block;background:rgba(240,165,0,0.15);border:1px solid rgba(240,165,0,0.4);color:var(--a1);border-radius:6px;font-size:0.72rem;font-weight:700;padding:2px 8px;margin-left:4px;vertical-align:middle;">Record : ${record}kg</span>`;
      const countBadge  = `<span style="display:inline-block;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--muted);border-radius:6px;font-size:0.72rem;font-weight:600;padding:2px 8px;margin-left:4px;vertical-align:middle;">${valid.length} séance${valid.length > 1 ? 's' : ''}</span>`;
      const accItems = valid.map((s, i) => `
        <div class="acc-item">
          <button class="acc-toggle" onclick="toggleAcc('acc-${k}-${safeId}-${i}')">
            Séance ${i + 1} <span style="color:var(--muted);font-size:0.75rem;margin-left:6px;">max ${sessionMaxKg(s)}kg</span> ▾
          </button>
          <div class="acc-body" id="acc-${k}-${safeId}-${i}">
            ${s.sets.map(set => `<div class="acc-row"><span>${set.reps} reps</span><span class="acc-kg">${set.kg}kg</span></div>`).join('')}
            <button class="del-seance-btn" onclick="askDelete('${k}','${name}',${i})">🗑 Supprimer</button>
          </div>
        </div>`).join('');
      const chartHtml = valid.length >= 2
        ? `<div style="margin-top:10px;font-size:0.75rem;color:var(--muted);">📈 Progression (max kg)</div>
           <div class="chart-wrap"><canvas id="${chartId}"></canvas></div>`
        : '';
      html += `
        <div class="exo-card">
          <div style="font-weight:700;margin-bottom:8px;">${name}</div>
          <div style="margin-bottom:10px;">${recordBadge}${progBadge}${countBadge}</div>
          ${accItems}
          ${chartHtml}
        </div>`;
    }
    el.innerHTML = html;

    // Init charts après injection dans le DOM
    for (const [name, seances] of Object.entries(S[k].exercises)) {
      const valid = seances.filter(s => s.sets?.length > 0);
      if (valid.length < 2) continue;
      renderChart(`chart-${k}-${name.replace(/[^a-zA-Z0-9]/g, '')}`, valid, color);
    }
  });

  window.onTypeChange();
  document.getElementById('sets-list').innerHTML = '';
  for (let i = 0; i < 3; i++) window.addSetRow();
}

// ─── AUTH ──────────────────────────────────────────────────────────────────────
window.loginWithFirebase = () => {
  const e = document.getElementById('login-email').value;
  const p = document.getElementById('login-pass').value;
  signInWithEmailAndPassword(auth, e, p).catch(err => alert('Erreur : ' + err.message));
};
window.registerWithFirebase = () => {
  const e = document.getElementById('login-email').value;
  const p = document.getElementById('login-pass').value;
  createUserWithEmailAndPassword(auth, e, p).catch(err => alert('Erreur : ' + err.message));
};
window.resetPassword = () => {
  const e = document.getElementById('login-email').value;
  if (!e) return alert('Entre ton email d\'abord.');
  sendPasswordResetEmail(auth, e)
    .then(() => alert('Email de réinitialisation envoyé ! Vérifie ta boîte mail.'))
    .catch(err => alert('Erreur : ' + err.message));
};
window.logoutFirebase = () => signOut(auth);

onAuthStateChanged(auth, u => {
  if (u) {
    userDoc = doc(db, 'sports_data', u.uid);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadData();
  } else {
    userDoc = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});
</script>
